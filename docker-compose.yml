version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: socialmind_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - socialmind_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialmind_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - socialmind_net
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialmind_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - socialmind_net
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # VITE_API_URL es para llamadas del navegador (host); localhost:8000 resuelve al backend desde el host
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:

networks:
  socialmind_net:
    driver: bridge
